<!doctype html>
<html lang="pt-PT" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexis - Aprendizagem das palavras</title>
    <script defer type="module" src="./src/navbar.js"></script>
    <script defer type="module" src="./src/main.js"></script>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row mb-5">
        <div class="col-12 text-center">
          <h1 class="fw-bold text-body mb-3" id="text-welcome">
            Bem vindo! 👋
          </h1>
          <p class="fs-5 text-body-secondary">
            Estás no <strong>Nível </strong> <strong id="level">4</strong>.
          </p>
        </div>
      </div>
      <div class="row g-4 justify-content-center">
        <div class="col-md-5">
          <div
            class="card game-card h-100 bg-body-tertiary text-center p-4 border-bottom border-info border-5"
          >
            <div class="card-body">
              <div class="display-1 text-info mb-3">
                <i class="fa-solid fa-map"></i>
              </div>
              <h2 class="card-title fw-bold text-body">Modo Normal</h2>
              <p class="card-text fs-5 text-body-secondary">
                Lorem Ipsum is simply dummy text of the printing and typesetting
              </p>
              <button
                id="btn-normal"
                class="btn btn-info text-white btn-play mt-3 w-100 shadow-sm"
              >
                <i class="fa-solid fa-play"></i> Jogar Normal
              </button>
            </div>
          </div>
        </div>
        <div class="col-md-5">
          <div
            class="card game-card h-100 bg-body-tertiary text-center p-4 border-bottom border-warning border-5"
          >
            <div class="card-body">
              <div class="display-1 text-warning mb-3">
                <i class="fa-solid fa-fire"></i>
              </div>
              <h2 class="card-title fw-bold text-body">Modo Hardcore</h2>
              <p class="card-text fs-5 text-body-secondary">
                It is a long established fact that a reader will be distracted
                by the readable content of a page when looking at its layout.
              </p>
              <button
                id="btn-hardcore"
                class="btn btn-warning text-dark btn-play mt-3 w-100 shadow-sm"
              >
                <i class="fa-solid fa-bolt"></i> Iniciar Desafio
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
