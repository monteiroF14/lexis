<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Lexis - Aprendizagem das palavras</title>
    <meta
      name="description"
      content="Lexis is a learning web application meant for people with dyslexia to improve their reading and vocal comprehension."
    />
    <script src="../js/dashboard_init.js" type="module"></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div
      class="d-flex flex-column flex-md-row lexis-viewport lexis-dashboard-wrapper"
    >
      <nav
        class="order-3 order-md-1 flex-md-shrink-0 d-flex flex-column lexis-sidebar-left"
      >
        <div class="d-none d-md-block position-relative lexis-sidebar-desktop">
          <div class="p-3 text-center">
            <img
              id="sidebar-logo"
              class="lexis-logo-img"
              src="../assets/img/LogoBlue.png"
              alt="Lexis"
            />
          </div>
          <div class="lexis-sidebar-overlay">
            <div
              class="mx-3 p-3 rounded-4 card-body"
              style="pointer-events: auto"
            >
              <div class="d-flex flex-column align-items-center gap-2">
                <button
                  class="btn rounded-3 py-2 px-4 text-center border-0 lexis-nav-btn"
                  data-tab="pdf"
                >
                  Documents
                </button>
                <button
                  class="btn rounded-3 py-2 px-4 text-center border-0 lexis-nav-btn"
                  data-tab="store"
                >
                  Store
                </button>
                <button
                  class="btn rounded-3 py-2 px-4 text-center border-0 lexis-nav-btn"
                  data-tab="customization"
                >
                  Customize
                </button>
                <button
                  class="btn rounded-3 py-2 px-4 text-center border-0 lexis-nav-btn"
                  data-tab="settings"
                >
                  Settings
                </button>
              </div>
            </div>
          </div>
        </div>

        <div
          class="d-flex d-md-none justify-content-around align-items-center py-2 border-top lexis-sidebar-left lexis-safe-bottom flex-shrink-0"
        >
          <button
            class="btn btn-sm p-2 border-0 rounded-3 lexis-mobile-nav-btn"
            data-tab="pdf"
          >
            📄
          </button>
          <button
            class="btn btn-sm p-2 border-0 rounded-3 lexis-mobile-nav-btn"
            data-tab="store"
          >
            🛒
          </button>
          <button
            id="btn-levels-mobile"
            class="btn btn-sm p-2 border-0 rounded-3 lexis-mobile-home-btn"
          >
            🏠
          </button>
          <button
            class="btn btn-sm p-2 border-0 rounded-3 lexis-mobile-nav-btn"
            data-tab="customization"
          >
            🎨
          </button>
          <button
            class="btn btn-sm p-2 border-0 rounded-3 lexis-mobile-nav-btn"
            data-tab="settings"
          >
            ⚙️
          </button>
        </div>
      </nav>

      <main
        class="order-2 flex-grow-1 overflow-y-auto lexis-bg-main"
        id="main-container"
      ></main>

      <aside class="order-1 order-md-3 lexis-sidebar-right flex-md-shrink-0">
        <div
          class="d-flex d-md-none align-items-center px-3 py-2 border-bottom lexis-sidebar-right lexis-gap-sm flex-shrink-0"
        >
          <img
            id="user-avatar-mobile"
            class="rounded-circle border lexis-avatar-sm"
            alt=""
          />
          <span class="fw-bold small lexis-text-p" id="user-name-mobile"
            >Guest</span
          >
          <span class="small text-secondary" id="user-level-mobile"></span>
          <span class="small ms-auto lexis-text-green"
            >⭐<span id="user-xp-mobile">0</span></span
          >
          <span class="small lexis-text-orange"
            >🪙<span id="user-coins-mobile">0</span></span
          >
        </div>

        <div class="d-none d-md-flex flex-column lexis-sidebar-right-desktop">
          <div class="p-3 flex-grow-1">
            <div class="card border-0 shadow-sm rounded-4 mb-3 text-center">
              <div class="card-body p-3">
                <h5 class="fw-bold mb-2 lexis-text-p" id="user-name">Guest</h5>
                <img
                  id="user-avatar"
                  alt="User avatar"
                  class="rounded-circle mx-auto d-block mb-2 border lexis-avatar-lg"
                />
                <p class="text-secondary mb-0 small" id="user-level">
                  Level 1 Explorer
                </p>
              </div>
            </div>
            <div class="card border-0 shadow-sm rounded-4 mb-3">
              <div class="card-body p-3">
                <div
                  class="d-flex justify-content-between align-items-center mb-2 pb-2 lexis-stat-row"
                >
                  <span class="small lexis-text-red">Level</span>
                  <span class="fw-bold small lexis-text-p" id="user-stats-level"
                    >1</span
                  >
                </div>
                <div
                  class="d-flex justify-content-between align-items-center mb-2 pb-2 lexis-stat-row"
                >
                  <span class="small lexis-text-green">XP</span>
                  <span class="fw-bold small lexis-text-p" id="user-stats-xp"
                    >0</span
                  >
                </div>
                <div class="d-flex justify-content-between align-items-center">
                  <span class="small lexis-text-orange">Coins</span>
                  <span class="fw-bold small lexis-text-p" id="user-stats-coins"
                    >0</span
                  >
                </div>
              </div>
            </div>
            <div class="card border-0 shadow-sm rounded-4 mb-3">
              <div class="card-body p-3">
                <div
                  class="d-flex justify-content-between align-items-center mb-1"
                >
                  <span class="small lexis-text-green">Daily XP</span>
                  <span class="small lexis-text-p" id="daily-xp-text">0%</span>
                </div>
                <div class="progress lexis-progress-thin">
                  <div
                    class="progress-bar lexis-bar-green"
                    id="daily-xp-bar"
                    role="progressbar"
                    style="width: 0%"
                  ></div>
                </div>
              </div>
            </div>
            <div class="card border-0 shadow-sm rounded-4 mb-3">
              <div class="card-body p-3">
                <div
                  class="d-flex justify-content-between align-items-center mb-1"
                >
                  <span class="small lexis-text-orange">Daily Coins</span>
                  <span class="small lexis-text-p" id="daily-coins-text"
                    >0%</span
                  >
                </div>
                <div class="progress lexis-progress-thin">
                  <div
                    class="progress-bar lexis-bar-orange"
                    id="daily-coins-bar"
                    role="progressbar"
                    style="width: 0%"
                  ></div>
                </div>
              </div>
            </div>
            <div class="card border-0 shadow-sm rounded-4 mb-3">
              <div class="card-body p-3 text-center">
                <div style="font-size: 1.8rem;" id="streak-flame">🔥</div>
                <div class="fw-bold lexis-text-p" id="streak-count">0</div>
                <div class="small text-secondary">day streak</div>
                <div class="small text-secondary mt-1">Best: <span id="streak-best">0</span></div>
              </div>
            </div>
          </div>
          <div class="p-3">
            <button
              id="btn-logout"
              class="btn w-100 rounded-3 text-white py-2 lexis-btn-logout"
            >
              Log Out
            </button>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
