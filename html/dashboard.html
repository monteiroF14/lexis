<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Lexis - Aprendizagem das palavras</title>
    <meta
      name="description"
      content="Lexis is a learning web application meant for people with dyslexia to improve their reading and vocal comprehension."
    />
    <script src="../js/dashboard_init.js" type="module"></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="d-flex flex-column flex-md-row" style="height: 100vh; overflow: hidden; background: #f0f0f0;">

      <!-- ====== Mobile: top header (right sidebar content) ====== -->
      <div class="d-flex d-md-none align-items-center px-3 py-2 border-bottom bg-white flex-shrink-0" style="gap: 0.5rem;">
        <img id="user-avatar-mobile" class="rounded-circle border" style="width: 32px; height: 32px; object-fit: cover;" alt="" />
        <span class="fw-bold small" id="user-name-mobile">Guest</span>
        <span class="small text-secondary" id="user-level-mobile"></span>
        <span class="small ms-auto" style="color: #22c55e;">⭐<span id="user-xp-mobile">0</span></span>
        <span class="small" style="color: #f97316;">🪙<span id="user-coins-mobile">0</span></span>
      </div>

      <!-- ====== Desktop: right sidebar ====== -->
      <aside class="d-none d-md-flex flex-column bg-white flex-shrink-0" style="width: 260px; height: 100vh;">
        <div class="p-3 flex-grow-1">
          <!-- Profile card -->
          <div class="card border-0 shadow-sm rounded-4 mb-3 text-center">
            <div class="card-body p-3">
              <h5 class="fw-bold mb-2" id="user-name">Guest</h5>
              <img
                id="user-avatar"
                alt="User avatar"
                class="rounded-circle mx-auto d-block mb-2 border"
                style="width: 100px; height: 100px; object-fit: cover"
              />
              <p class="text-secondary mb-0 small" id="user-level">Level 1 Explorer</p>
            </div>
          </div>
          <!-- Stats card -->
          <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
              <div class="d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid #eee;">
                <span class="small" style="color: #ef4444;">Level</span>
                <span class="fw-bold small" id="user-stats-level">1</span>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-2 pb-2" style="border-bottom: 1px solid #eee;">
                <span class="small" style="color: #22c55e;">XP</span>
                <span class="fw-bold small" id="user-stats-xp">0</span>
              </div>
              <div class="d-flex justify-content-between align-items-center">
                <span class="small" style="color: #f97316;">Coins</span>
                <span class="fw-bold small" id="user-stats-coins">0</span>
              </div>
            </div>
          </div>
          <!-- Daily XP -->
          <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="small" style="color: #22c55e;">Daily XP</span>
                <span class="small" id="daily-xp-text">0%</span>
              </div>
              <div class="progress" style="height: 8px;">
                <div class="progress-bar" id="daily-xp-bar" role="progressbar" style="width: 0%; background-color: #22c55e;"></div>
              </div>
            </div>
          </div>
          <!-- Daily Coins -->
          <div class="card border-0 shadow-sm rounded-4 mb-3">
            <div class="card-body p-3">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="small" style="color: #f97316;">Daily Coins</span>
                <span class="small" id="daily-coins-text">0%</span>
              </div>
              <div class="progress" style="height: 8px;">
                <div class="progress-bar" id="daily-coins-bar" role="progressbar" style="width: 0%; background-color: #f97316;"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- Log Out -->
        <div class="p-3">
          <button id="btn-logout" class="btn w-100 rounded-3 text-white py-2" style="background-color: #4f46e5; border: none;">Log Out</button>
        </div>
      </aside>

      <!-- ====== Main content ====== -->
      <main class="order-2 flex-grow-1 overflow-y-auto" id="main-container" style="background: #f0f0f0;"></main>

      <!-- ====== Desktop: left sidebar / Mobile: bottom nav ====== -->
      <nav class="d-md-flex flex-column flex-shrink-0 bg-white" style="">
        <!-- Desktop nav -->
        <div class="d-none d-md-block position-relative" style="width: 200px; height: 100vh;">
          <div class="p-3 text-center">
            <img id="sidebar-logo" src="../assets/img/LogoBlue.png" style="height: 50px; cursor: pointer;" alt="Lexis" />
          </div>
          <div class="position-absolute d-flex align-items-center justify-content-center" style="top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;">
            <div class="mx-3 p-3 rounded-4" style="background: #f3f4f6; pointer-events: auto;">
              <div class="d-flex flex-column align-items-center gap-2">
                <button class="btn rounded-3 py-2 px-4 text-center border-0" data-tab="pdf" style="background-color: #e5e7eb; color: #374151;">Documents</button>
                <button class="btn rounded-3 py-2 px-4 text-center border-0" data-tab="store" style="background-color: #e5e7eb; color: #374151;">Store</button>
                <button class="btn rounded-3 py-2 px-4 text-center border-0" data-tab="customization" style="background-color: #e5e7eb; color: #374151;">Customize</button>
                <button class="btn rounded-3 py-2 px-4 text-center border-0" data-tab="settings" style="background-color: #e5e7eb; color: #374151;">Settings</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Mobile bottom nav -->
        <div class="d-flex d-md-none justify-content-around align-items-center py-1 border-top bg-white" id="bottom-nav">
          <button class="btn btn-sm p-2 border-0 rounded-3" data-tab="pdf" style="font-size: 1.3rem; background: none; color: #374151;">📄</button>
          <button class="btn btn-sm p-2 border-0 rounded-3" data-tab="store" style="font-size: 1.3rem; background: none; color: #374151;">🛒</button>
          <button class="btn btn-sm p-2 border-0 rounded-3" data-tab="customization" style="font-size: 1.3rem; background: none; color: #374151;">🎨</button>
          <button class="btn btn-sm p-2 border-0 rounded-3" data-tab="settings" style="font-size: 1.3rem; background: none; color: #374151;">⚙️</button>
        </div>
      </nav>

    </div>
  </body>
</html>
