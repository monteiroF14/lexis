<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Lexis - Aprendizagem das palavras</title>
    <meta
      name="description"
      content="Lexis is a learning web application meant for people with dyslexia to improve their reading and vocal comprehension.
"
    />
    <script src="../js/dashboard_init.js" type="module"></script>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div
      class="container-fluid py-4"
      style="min-height: 100vh; background: #f5f7fb"
    >
      <div class="row g-4">
        <!-- Left sidebar -->
        <aside class="col-12 col-lg-2">
          <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body p-4">
              <h4 class="fw-bold mb-4">Lexis</h4>

              <div class="d-grid gap-3">
                <button
                  class="btn btn-light text-start rounded-4 py-3 px-3 border"
                  id="btn-pdf"
                >
                  📄 Read PDFs
                </button>
                <button
                  class="btn btn-light text-start rounded-4 py-3 px-3 border"
                  id="btn-levels"
                >
                  Levels
                </button>
                <button
                  class="btn btn-light text-start rounded-4 py-3 px-3 border"
                  id="btn-store"
                >
                  🛍️ Store
                </button>
                <button
                  class="btn btn-light text-start rounded-4 py-3 px-3 border"
                  id="btn-customization"
                >
                  🎨 Customization
                </button>
                <button
                  class="btn btn-light text-start rounded-4 py-3 px-3 border"
                  id="btn-settings"
                >
                  ⚙️ Settings
                </button>
              </div>
            </div>
          </div>
        </aside>

        <!-- Main content -->
        <main class="col-12 col-lg-7" id="main-container"></main>

        <!-- Right sidebar -->
        <aside class="col-12 col-lg-3">
          <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4 text-center">
              <img
                id="user-avatar"
                alt="User avatar"
                class="rounded-circle mx-auto d-block mb-3 border"
                style="width: 120px; height: 120px; object-fit: cover"
              />
              <h4 class="fw-bold mb-1">Miguel</h4>
              <p class="text-secondary mb-0">Level 1 Explorer</p>
            </div>
          </div>

          <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3">Progress</h5>
              <p class="mb-2">XP: <strong>120</strong></p>
              <div class="progress mb-3" style="height: 10px">
                <div class="progress-bar bg-primary" style="width: 60%"></div>
              </div>
              <p class="mb-0">Coins: <strong>45</strong></p>
            </div>
          </div>

          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3">Quick Info</h5>
              <ul class="list-unstyled mb-0">
                <li class="mb-2">✅ 3 worksheets completed</li>
                <li class="mb-2">⭐ 1 reward unlocked</li>
                <li class="mb-0">🎁 New store items available</li>
              </ul>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </body>
</html>
